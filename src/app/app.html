<div class="shell">
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-top">
        <div class="logo-badge" aria-hidden="true">
          <span class="logo-ring"></span>
          <span class="logo-text">RGL</span>
        </div>
        <div>
          <p class="eyebrow">Rose Gold Lexury</p>
          <h1>Control Center</h1>
        </div>
      </div>
      <p class="muted">Ventas, inventario y gestion administrativa en una sola plataforma.</p>
    </div>

    <ng-container *ngIf="user$ | async as user; else guestMenu">
      <nav class="menu">
        <a routerLink="/dashboard" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
          Dashboard
        </a>
        <a
          *ngIf="canSeeProductsMenu"
          routerLink="/products"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: true }">
          Productos
        </a>
        <a *ngIf="canSeeInventoryMenu" routerLink="/stock" routerLinkActive="active">Inventario</a>
        <a routerLink="/stock/movements" routerLinkActive="active" *ngIf="canSeeProcurementMenu">
          Auditoria
        </a>
        <a routerLink="/procurement" routerLinkActive="active" *ngIf="canSeeProcurementMenu">
          Compras
        </a>
        <a routerLink="/sales/commissions" routerLinkActive="active" *ngIf="canSeeSalesMenu">
          Comisiones
        </a>
        <a routerLink="/admin/users" routerLinkActive="active" *ngIf="canSeeAdminMenu">
          Usuarios
        </a>
      </nav>

      <div class="session-card">
        <p class="session-label">Sesion activa</p>
        <p class="session-email">{{ user.email }}</p>
        <p class="session-role" *ngIf="profile$ | async as profile">{{ profile.role }}</p>
        <button type="button" class="session-btn" (click)="signOut()">Cerrar sesion</button>
      </div>
    </ng-container>

    <ng-template #guestMenu>
      <nav class="menu guest-only">
        <a routerLink="/auth/login" routerLinkActive="active">Acceso</a>
      </nav>
      <div class="session-card">
        <p class="session-label">Sin sesion</p>
        <a class="session-link" routerLink="/auth/login">Iniciar sesion</a>
      </div>
    </ng-template>
  </aside>

  <main class="content">
    <router-outlet />
  </main>
</div>
