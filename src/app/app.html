<div class="shell">
  <aside class="sidebar">
    <div class="brand">
      <p class="eyebrow">Rose Gold Lexury</p>
      <h1>Control Center</h1>
      <p class="muted">MVP de productos e inventario con Angular + Supabase.</p>
    </div>

    <nav class="menu">
      <a routerLink="/products" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
        Productos
      </a>
      <a routerLink="/stock" routerLinkActive="active">Inventario</a>
      <a routerLink="/auth/login" routerLinkActive="active">Acceso</a>
    </nav>

    <div class="session-card" *ngIf="user$ | async as user; else guestBox">
      <p class="session-label">Sesión activa</p>
      <p class="session-email">{{ user.email }}</p>
      <button type="button" class="session-btn" (click)="signOut()">Cerrar sesión</button>
    </div>
    <ng-template #guestBox>
      <div class="session-card">
        <p class="session-label">Sin sesión</p>
        <a class="session-link" routerLink="/auth/login">Iniciar sesión</a>
      </div>
    </ng-template>
  </aside>

  <main class="content">
    <router-outlet />
  </main>
</div>
