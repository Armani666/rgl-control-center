<section class="page">
  <header class="page-header">
    <div>
      <p class="eyebrow">Rose Gold Lexury</p>
      <h1>{{ isEditMode ? 'Editar producto' : 'Nuevo producto' }}</h1>
      <p class="muted">Gestiona catalogo maestro y datos de publicacion web.</p>
    </div>
    <a class="btn btn-secondary" routerLink="/products">Volver</a>
  </header>

  <form class="card form-grid" [formGroup]="form" (ngSubmit)="submit()">
    <label>
      SKU
      <input type="text" formControlName="sku" placeholder="RGL-MAY01" [readonly]="!isEditMode" />
      <span class="helper">Se genera automaticamente por marca al crear el producto.</span>
    </label>

    <label>
      Nombre
      <input type="text" formControlName="name" placeholder="Labial Velvet" />
    </label>

    <label>
      Categoria
      <input type="text" formControlName="category" placeholder="Labiales" />
    </label>

    <label>
      Marca (interna)
      <input type="text" formControlName="brand" placeholder="Rose Gold" />
    </label>

    <label>
      Marca publica
      <input type="text" formControlName="brandPublic" placeholder="ROSE GOLD" />
    </label>

    <label>
      Colores
      <input type="text" formControlName="colorsInput" placeholder="rojo, nude, coral" />
    </label>

    <label>
      Precio
      <input type="number" min="0" step="0.01" formControlName="price" />
    </label>

    <label>
      Stock minimo
      <input type="number" min="0" step="1" formControlName="minStock" />
    </label>

    <label class="full">
      Imagen principal (image_url)
      <input type="url" formControlName="imageUrl" placeholder="https://..." />
      <div class="preview-card" *ngIf="coverPreviewUrl as cover">
        <img [src]="cover" alt="Vista previa portada del producto" loading="lazy" />
      </div>
      <div class="upload-row">
        <input
          type="file"
          accept="image/*"
          (change)="uploadCoverFromFile($event)"
          [disabled]="saving || loading || uploadingCover"
        />
        <span class="upload-status">{{ uploadingCover ? 'Subiendo portada...' : 'Subir a Storage (opcional)' }}</span>
      </div>
    </label>

    <label class="full">
      Galeria (image_urls)
      <textarea
        rows="4"
        formControlName="imageUrlsInput"
        placeholder="Una URL por linea o separadas por coma"
      ></textarea>
      <div class="upload-row">
        <input
          type="file"
          accept="image/*"
          multiple
          (change)="uploadGalleryFromFiles($event)"
          [disabled]="saving || loading || uploadingGallery"
        />
        <span class="upload-status">{{ uploadingGallery ? 'Subiendo galeria...' : 'Subir imagenes a Storage (opcional)' }}</span>
      </div>
      <div class="preview-grid" *ngIf="galleryPreviewUrls.length > 0">
        <div class="preview-card" *ngFor="let url of galleryPreviewUrls">
          <img [src]="url" alt="Vista previa de imagen de galeria" loading="lazy" />
        </div>
      </div>
    </label>

    <label class="full">
      Descripcion
      <textarea rows="4" formControlName="description" placeholder="Detalles del producto"></textarea>
    </label>

    <label class="checkbox">
      <input type="checkbox" formControlName="active" />
      Activo
    </label>

    <div class="full helper" *ngIf="form.invalid && form.touched">
      Revisa los campos requeridos (`Nombre`, `Precio`, `Stock minimo`).
    </div>

    <div class="full helper error" *ngIf="errorMessage">{{ errorMessage }}</div>

    <div class="full actions">
      <button type="submit" class="btn btn-primary" [disabled]="saving || loading">
        {{ saving ? 'Guardando...' : (isEditMode ? 'Actualizar producto' : 'Crear producto') }}
      </button>
    </div>
  </form>
</section>
